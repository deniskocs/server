# Router: stream :443 (SNI passthrough) + http :80 / :8443 (chilik terminate).
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

# TZone staging: TCP passthrough → k3s Traefik :443 (TLS в cert-manager).
# chilik.net: passthrough → локальный nginx :8443 (certbot, terminate).
stream {
    map $ssl_preread_server_name $upstream_tls {
        stage.t-zone.org             10.0.0.2:443;
        auth.stage.t-zone.org        10.0.0.2:443;
        tenant.stage.t-zone.org      10.0.0.2:443;
        argo.chilik.net              10.0.0.2:443;
        learn-english.chilik.net     10.0.0.2:443;
        ~^.+\.stage\.t-zone\.org$    10.0.0.2:443;
        default                      127.0.0.1:8443;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $upstream_tls;
        proxy_timeout 600s;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen          80;
        server_name     stage.t-zone.org auth.stage.t-zone.org tenant.stage.t-zone.org
                        darlings.stage.t-zone.org *.stage.t-zone.org;

        # HTTP-01: cert-manager solver на Traefik (challenge → k3s).
        location /.well-known/acme-challenge/ {
            proxy_pass http://10.0.0.2:80;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen          80;
        server_name     learn-english.chilik.net argo.chilik.net;

        # HTTP-01: cert-manager solver на Traefik (challenge → k3s).
        location /.well-known/acme-challenge/ {
            proxy_pass http://10.0.0.2:80;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen          80;
        server_name     api.chilik.net;

        # certbot HTTP-01 для api.chilik.net.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen       8443 ssl;
        server_name  api.chilik.net;

        resolver 127.0.0.11 valid=10s;

        ssl_certificate     /etc/nginx/ssl/api.chilik.net.crt;
        ssl_certificate_key /etc/nginx/ssl/api.chilik.net.key;
        ssl_trusted_certificate /etc/nginx/ssl/api.chilik.net.bundle.crt;

        client_max_body_size 100M;

        location / {
            set $backend "backend:8080";
            proxy_pass http://$backend;

            proxy_request_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}
