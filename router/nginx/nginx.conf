server {
  listen          80;
  server_name     api.chilik.net learn-english.chilik.net
                  stage.t-zone.org auth.stage.t-zone.org tenant.stage.t-zone.org
                  *.stage.t-zone.org;

  # Для веб-рута certbot (Let's Encrypt валидация)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen       443 ssl;
  server_name  api.chilik.net;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/api.chilik.net.crt;
  ssl_certificate_key /etc/nginx/ssl/api.chilik.net.key;
  ssl_trusted_certificate /etc/nginx/ssl/api.chilik.net.bundle.crt;

  client_max_body_size 100M;

  location / {
    set $backend "backend:8080";
    proxy_pass http://$backend;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  server_name     learn-english.chilik.net;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/api.chilik.net.crt;
  ssl_certificate_key /etc/nginx/ssl/api.chilik.net.key;
  ssl_trusted_certificate /etc/nginx/ssl/api.chilik.net.bundle.crt;

  client_max_body_size 100M;

  location / {
    set $backend "web:80";
    proxy_pass http://$backend;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- TZone staging (Docker network tzone_staging) ---

server {
  listen       443 ssl;
  server_name  auth.stage.t-zone.org;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/stage.t-zone.org.crt;
  ssl_certificate_key /etc/nginx/ssl/stage.t-zone.org.key;
  ssl_trusted_certificate /etc/nginx/ssl/stage.t-zone.org.bundle.crt;

  client_max_body_size 100M;

  # BFF login API only. Keycloak (tzone-keycloak:8080) — internal, не публикуем.
  location / {
    set $backend "tzone-auth:6201";
    proxy_pass http://$backend;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
  }
}

server {
  listen       443 ssl;
  server_name  tenant.stage.t-zone.org;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/stage.t-zone.org.crt;
  ssl_certificate_key /etc/nginx/ssl/stage.t-zone.org.key;
  ssl_trusted_certificate /etc/nginx/ssl/stage.t-zone.org.bundle.crt;

  client_max_body_size 100M;

  location / {
    set $backend "tzone-tenant:6203";
    proxy_pass http://$backend;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen       443 ssl;
  server_name  stage.t-zone.org;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/stage.t-zone.org.crt;
  ssl_certificate_key /etc/nginx/ssl/stage.t-zone.org.key;
  ssl_trusted_certificate /etc/nginx/ssl/stage.t-zone.org.bundle.crt;

  client_max_body_size 100M;

  # k3s Traefik HTTP (linuxvm). TLS для клиента — на router (certbot).
  location / {
    proxy_pass http://10.0.0.2:80;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Публичные сайты тенантов: {subdomain}.stage.t-zone.org (напр. darlings.stage.t-zone.org)
# В cert — явные SAN из STAGE_CERT_DOMAINS; произвольные субдомены — wildcard *.stage.t-zone.org (DNS-01).
server {
  listen       443 ssl;
  server_name  *.stage.t-zone.org;

  resolver 127.0.0.11 valid=10s;

  ssl_certificate     /etc/nginx/ssl/stage.t-zone.org.crt;
  ssl_certificate_key /etc/nginx/ssl/stage.t-zone.org.key;
  ssl_trusted_certificate /etc/nginx/ssl/stage.t-zone.org.bundle.crt;

  client_max_body_size 100M;

  # k3s Traefik HTTP (linuxvm). auth/tenant — отдельные server-блоки выше.
  location / {
    proxy_pass http://10.0.0.2:80;

    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
