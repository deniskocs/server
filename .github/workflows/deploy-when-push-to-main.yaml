name: Deploy web application to AWS EC2 instance

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/arm64
        tags: deniskocs/router:0.0.1

    - name: Logout from Docker Hub
      run: docker logout

    - name: Setting up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY_DEPLOY_TO_MAC_SERVER_BASE64 }}" | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        chmod 644 ~/.ssh/known_hosts

    - name: Deploy Router on EC2
      run: |
        ssh -o "StrictHostKeyChecking=no" ${{ secrets.MAC_USER }}@${{ secrets.MAC_HOST }} << 'EOF'
        docker network create learn_english || true
        docker rm router -f
        docker rmi deniskocs/router:0.0.1
        docker run -d -ti --name router -p 80:80 -p 443:443 -v /Users/home_mac_server/letsencrypt:/etc/letsencrypt --network learn_english --restart unless-stopped deniskocs/router:0.0.1
        EOF
