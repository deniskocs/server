name: Release LLM Orchestrator API

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump from latest git tag (current = rebuild & redeploy latest)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      git_tag: ${{ steps.version.outputs.git_tag }}
      tag_mode: ${{ steps.version.outputs.tag_mode }}
      bump: ${{ github.event.inputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          .github/scripts/compute-release-version.sh llm-orchestrator-api/v "${{ github.event.inputs.bump }}" deniskocs/llm-orchestrator-api

  build-image:
    needs: release
    uses: ./.github/workflows/reusable-docker-multiarch-build.yml
    with:
      context: ./llm-orchestrator/backend
      dockerfile: ./llm-orchestrator/backend/Dockerfile
      image_repo: deniskocs/llm-orchestrator-api
      version: ${{ needs.release.outputs.version }}
      cache_slug: llm-orchestrator-api
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

  finish:
    needs: [release, build-image]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open deploy PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          .github/scripts/open-deploy-pr.sh \
            llm-orchestrator-api \
            infra/k8s/llm-orchestrator/llm-orchestrator-api.yaml \
            deniskocs/llm-orchestrator-api \
            "${{ needs.release.outputs.version }}" \
            "${{ needs.release.outputs.git_tag }}" \
            "${{ needs.release.outputs.bump }}"

      - name: Create git tag
        run: |
          set -euo pipefail
          .github/scripts/create-release-tag.sh \
            "${{ needs.release.outputs.git_tag }}" \
            "${{ needs.release.outputs.version }}" \
            "${{ needs.release.outputs.tag_mode }}" \
            llm-orchestrator-api
