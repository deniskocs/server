# Trunk.io: проверка кода в llm-orchestrator (не pre-commit в git, а CI на push/PR).
name: Trunk — llm-orchestrator

on:
  push:
    paths:
      - "llm-orchestrator/**"
      - ".trunk/**"
      - ".github/workflows/trunk-llm-orchestrator.yaml"
  pull_request:
    paths:
      - "llm-orchestrator/**"
      - ".trunk/**"
      - ".github/workflows/trunk-llm-orchestrator.yaml"

concurrency:
  group: trunk-llm-orchestrator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  trunk:
    name: Trunk check (llm-orchestrator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trunk
        uses: trunk-io/trunk-action@v1
        with:
          # Явно ограничиваем область, совместно с .trunk/trunk.yaml
          arguments: llm-orchestrator
