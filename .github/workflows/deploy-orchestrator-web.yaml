# SSH-деплой web UI на Mac. Образ собирается release-llm-orchestrator-web.
# Версия берётся из deploy/llm-orchestrator/web.yaml (после merge deploy PR).
name: Deploy Orchestrator Web

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read target image version
        id: image
        run: |
          set -euo pipefail
          IMAGE_LINE="$(grep -E 'deniskocs/llm-orchestrator-web:' deploy/llm-orchestrator/web.yaml | head -n1)"
          VERSION="${IMAGE_LINE##*:}"
          VERSION="${VERSION// /}"
          echo "image=deniskocs/llm-orchestrator-web:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying deniskocs/llm-orchestrator-web:${VERSION}"

      - name: Setting up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_DEPLOY_TO_MAC_SERVER_BASE64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.MAC_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy LLM Orchestrator web on Mac
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          ssh -i ~/.ssh/id_rsa -o "StrictHostKeyChecking=no" -o "IdentitiesOnly=yes" ${{ secrets.MAC_USER }}@${{ secrets.MAC_HOST }} << EOF
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:\$PATH"
          colima start
          docker network create llm_orchestrator || true
          docker rm llm-orchestrator-web -f
          docker pull ${IMAGE}
          docker run -d -ti --name llm-orchestrator-web -p 8088:80 --network llm_orchestrator --restart unless-stopped ${IMAGE}
          EOF
