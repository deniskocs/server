name: Reusable Docker multi-arch build

on:
  workflow_call:
    inputs:
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      image_repo:
        required: true
        type: string
      version:
        required: true
        type: string
      cache_slug:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ inputs.image_repo }}:${{ inputs.version }}-amd64
          build-args: ${{ inputs.build_args }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

  build-arm64:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare BuildKit cache directory
        id: cache
        run: |
          set -euo pipefail
          CACHE_DIR="${HOME}/.cache/buildkit/server/${{ inputs.cache_slug }}"
          mkdir -p "$CACHE_DIR"
          echo "dir=${CACHE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ inputs.image_repo }}:${{ inputs.version }}-arm64
          build-args: ${{ inputs.build_args }}
          cache-from: type=local,src=${{ steps.cache.outputs.dir }}
          cache-to: type=local,dest=${{ steps.cache.outputs.dir }},mode=max

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

  merge:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.image_repo }}"
          VERSION="${{ inputs.version }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:staging" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
