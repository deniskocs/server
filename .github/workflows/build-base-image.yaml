# Базовый образ PyTorch/CUDA: ./base/Dockerfile → deniskocs/core:server-base-0.1.0
# (используется vLLM runner и др.). Тяжёлая сборка — по кнопке или при изменении base/.
name: Build and push base image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "base/**"
      - ".github/workflows/build-base-image.yaml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./base
          file: ./base/Dockerfile
          push: true
          platforms: linux/amd64
          tags: deniskocs/core:server-base-0.1.0

      - name: Log out of Docker Hub
        run: docker logout
