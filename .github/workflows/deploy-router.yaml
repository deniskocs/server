name: Deploy Router

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Router image
      uses: docker/build-push-action@v5
      with:
        context: ./router
        push: true
        platforms: linux/arm64
        tags: deniskocs/router:0.0.1

    - name: Logout from Docker Hub
      run: docker logout

    - name: Setting up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY_DEPLOY_TO_MAC_SERVER_BASE64 }}" | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.MAC_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        chmod 644 ~/.ssh/known_hosts

    - name: Deploy Router on Mac Studio
      run: |
        ssh -i ~/.ssh/id_rsa -o "StrictHostKeyChecking=no" -o "IdentitiesOnly=yes" ${{ secrets.MAC_USER }}@${{ secrets.MAC_HOST }} << 'EOF'
        set -x
        export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"

        echo "=== deploy diagnostics (before docker) ==="
        date
        whoami
        hostname
        uname -a
        echo "PATH=$PATH"
        echo "HOME=$HOME"
        echo "SHELL=$SHELL"
        echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
        command -v colima || true
        command -v docker || true
        colima version 2>&1 || true
        colima status 2>&1 || true
        ls -la "$HOME/.colima/default/docker.sock" 2>&1 || true
        ls -la "$HOME/.docker/run/docker.sock" 2>&1 || true

        echo "=== colima start ==="
        colima start 2>&1
        sleep 3
        colima status 2>&1
        export DOCKER_HOST="unix://${HOME}/.colima/default/docker.sock"
        echo "DOCKER_HOST=$DOCKER_HOST"
        docker version 2>&1 || true

        set -e
        docker network create learn_english || true
        docker network create tzone_staging || true
        docker pull deniskocs/router:0.0.1
        docker rm -f router 2>/dev/null || true
        docker run -d --name router -p 80:80 -p 443:443 \
          -v /Users/home_mac_server/letsencrypt:/etc/letsencrypt \
          --network learn_english --network tzone_staging \
          --restart unless-stopped deniskocs/router:0.0.1
        docker ps --filter name=router
        EOF
