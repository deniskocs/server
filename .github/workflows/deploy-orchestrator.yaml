name: Deploy Orchestrator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push LLM Orchestrator web image
      uses: docker/build-push-action@v5
      with:
        context: ./llm-orchestrator/web
        file: ./llm-orchestrator/web/Dockerfile
        push: true
        platforms: linux/arm64
        tags: deniskocs/llm-orchestrator-web:0.0.1

    - name: Logout from Docker Hub
      run: docker logout

    - name: Setting up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY_DEPLOY_TO_MAC_SERVER_BASE64 }}" | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan ${{ secrets.MAC_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        chmod 644 ~/.ssh/known_hosts

    - name: Deploy LLM Orchestrator web on Mac
      run: |
        ssh -i ~/.ssh/id_rsa -o "StrictHostKeyChecking=no" -o "IdentitiesOnly=yes" ${{ secrets.MAC_USER }}@${{ secrets.MAC_HOST }} << 'EOF'
        docker network create llm_orchestrator || true
        docker rm llm-orchestrator-web -f
        docker rmi deniskocs/llm-orchestrator-web:0.0.1
        docker run -d -ti --name llm-orchestrator-web -p 8088:80 --network llm_orchestrator --restart unless-stopped deniskocs/llm-orchestrator-web:0.0.1
        EOF
