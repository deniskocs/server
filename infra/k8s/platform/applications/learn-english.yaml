# Дочерний Argo CD Application (создаётся корневым platform-root).
# Манифесты Learn English — в репозитории learn-english-backend (infra/k8s).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: learn-english
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:deniskocs/learn-english-backend.git
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: learn-english
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
