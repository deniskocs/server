# Argo CD: argo.stage.t-zone.org — cert-manager + Traefik websecure.
configs:
  cm:
    url: https://argo.stage.t-zone.org
    # Kustomize helmCharts (cert-manager, ESO, …) require helm inflation — see server Application path infra/k8s/server.
    kustomize.buildOptions: --enable-helm
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
