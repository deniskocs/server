# Argo CD: argo.chilik.net — cert-manager + Traefik websecure (repo server/infra/k8s/server/argocd).
configs:
  cm:
    url: https://argo.chilik.net
    # Kustomize helmCharts (cert-manager, ESO, …) require helm inflation — see server Application path infra/k8s/server.
    kustomize.buildOptions: --enable-helm
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
