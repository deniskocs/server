# TLS: argo.chilik.net — Mac router (certbot); argo.stage.t-zone.org — cert-manager (Ingress argocd-server-stage).
# Канонический URL Argo (редиректы UI) — chilik; stage — тот же UI, альтернативный вход.
configs:
  cm:
    url: https://argo.chilik.net
    # Kustomize helmCharts (cert-manager, ESO, …) require helm inflation — see server Application path infra/k8s/server.
    kustomize.buildOptions: --enable-helm
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
