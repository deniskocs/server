# App-of-apps: корневой Argo CD Application.
#
# platform-root следит за infra/k8s/platform/applications в этом репозитории (server):
# только Application server (platform k8s). Продуктовые репозитории подключаются
# к Argo CD сами (манифест Application в своём репо, одноразовый kubectl apply).
#
# Требует SSH-доступ Argo CD к server.
applications:
  platform-root:
    namespace: argocd
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    project: default
    source:
      repoURL: git@github.com:deniskocs/server.git
      targetRevision: main
      path: infra/k8s/platform/applications
      directory:
        recurse: false
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
