# TLS keycloak.chilik.net: HTTP-01 через Traefik (Mac nginx :80 → 10.0.0.2:80).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-chilik-net
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  secretName: keycloak-chilik-net-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - keycloak.chilik.net
