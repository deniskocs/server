# Импорт realm llm-orchestrator (keycloak-config-cli). Отдельный Job вместо Helm hook —
# chart keycloak через Kustomize+Argo CD часто зависает на batch/Job/keycloak-keycloak-config-cli.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config-cli-llm-orchestrator
  namespace: keycloak
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "22"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: keycloak-config-cli
        app.kubernetes.io/part-of: keycloak
    spec:
      restartPolicy: Never
      containers:
        - name: keycloak-config-cli
          # bitnami/* теги сняты; adorsys — upstream keycloak-config-cli (совместим с Keycloak 26).
          image: docker.io/adorsys/keycloak-config-cli:6.5.1-26
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.keycloak.svc.cluster.local:80
            - name: KEYCLOAK_USER
              value: admin
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: IMPORT_FILES_LOCATIONS
              value: /config/*
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: llm-orchestrator-keycloak-realm
        - name: tmp
          emptyDir: {}
