# Секреты Keycloak (engine) из Bitwarden → Secret keycloak-secrets в namespace keycloak.
# BSM project tzone (тот же ID, что bitwarden-tzone — без переноса секретов в BSM).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "19"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-cluster
    kind: ClusterSecretStore
  target:
    name: keycloak-secrets
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: keycloak-admin-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
    - secretKey: password
      remoteRef:
        key: keycloak-db-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
    - secretKey: postgres-password
      remoteRef:
        key: keycloak-db-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
