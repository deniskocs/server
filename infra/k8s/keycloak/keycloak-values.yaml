# bitnami/keycloak — пароли только из Secret keycloak-secrets (ExternalSecret + Bitwarden).
# См. external-secret-keycloak.yaml и README (имена секретов в BSM).

auth:
  adminUser: admin
  existingSecret: keycloak-secrets

httpEnabled: true

# Публичный доступ: keycloak.chilik.net (certificate + ingress в этом каталоге).
# TLS terminate на Traefik; Keycloak — HTTP + proxy headers (chart 25 validation).
proxy: edge
proxyHeaders: xforwarded
production: true
hostname: keycloak.chilik.net

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak

postgresql:
  enabled: true
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql

# Realm llm-orchestrator — llm-orchestrator-realm.json → ConfigMap llm-orchestrator-keycloak-realm.
keycloakConfigCli:
  enabled: true
  existingConfigmap: llm-orchestrator-keycloak-realm
  annotations:
    argocd.argoproj.io/sync-wave: "22"

commonAnnotations:
  argocd.argoproj.io/sync-wave: "20"
