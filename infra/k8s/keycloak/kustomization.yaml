# Platform Keycloak: namespace, Bitwarden secrets, Helm, Ingress keycloak.chilik.net.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: keycloak
    repo: oci://registry-1.docker.io/bitnamicharts
    version: "25.2.0"
    releaseName: keycloak
    namespace: keycloak
    valuesFile: keycloak-values.yaml

configMapGenerator:
  - name: llm-orchestrator-keycloak-realm
    namespace: keycloak
    files:
      - llm-orchestrator-realm.json
    options:
      annotations:
        argocd.argoproj.io/sync-wave: "19"

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace-keycloak.yaml
  - external-secret-keycloak.yaml
  - certificate-keycloak-chilik-net.yaml
  - ingress-keycloak.yaml
  - job-keycloak-config-cli-llm-orchestrator.yaml
