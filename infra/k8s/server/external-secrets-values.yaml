# https://github.com/external-secrets/external-secrets/tree/main/deploy/charts/external-secrets
installCRDs: true

# TLS для SDK выпускается cert-manager (см. certificate-* / issuer-* в этом каталоге).
# Deployment SDK синхронизируется позже (sync-wave), когда Secret bitwarden-tls-certs уже есть.
bitwarden-sdk-server:
  enabled: true
  deploymentAnnotations:
    argocd.argoproj.io/sync-wave: "20"
