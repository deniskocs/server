# Секреты Keycloak из Bitwarden → Secret keycloak-secrets в namespace keycloak.
# Имена в BSM (проект tzone): keycloak-admin-password, keycloak-db-password.
# Поиск по имени: remoteRef.property = projectID (см. доку ESO Bitwarden).
# https://external-secrets.io/latest/provider/bitwarden-secrets-manager/
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-tzone
    kind: ClusterSecretStore
  target:
    name: keycloak-secrets
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: keycloak-admin-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
    - secretKey: password
      remoteRef:
        key: keycloak-db-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
    - secretKey: postgres-password
      remoteRef:
        key: keycloak-db-password
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
