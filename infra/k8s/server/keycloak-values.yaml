# bitnami/keycloak — пароли только из Secret keycloak-secrets (ExternalSecret + Bitwarden).
# См. external-secret-keycloak.yaml и README (имена секретов в BSM).

auth:
  adminUser: admin
  existingSecret: keycloak-secrets

httpEnabled: true

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak

postgresql:
  enabled: true
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql

commonAnnotations:
  argocd.argoproj.io/sync-wave: "20"
