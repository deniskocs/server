# Пример: подставь remoteRef.key — имя секрета в проекте tzone или его UUID
# (см. https://external-secrets.io/latest/provider/bitwarden-secrets-manager/).
# Целевой Secret по умолчанию: tzone-sm-secrets в namespace external-secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitwarden-tzone
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-tzone
    kind: SecretStore
  target:
    name: tzone-sm-secrets
    creationPolicy: Owner
  data:
    - secretKey: example
      remoteRef:
        key: change-me
