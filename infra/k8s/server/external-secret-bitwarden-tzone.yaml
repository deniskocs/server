# remoteRef.key — UUID секрета в BSM (Find by UUID; property не нужен).
# Для поиска по имени: key = имя, remoteRef.property = projectID (см. доку).
# https://external-secrets.io/latest/provider/bitwarden-secrets-manager/
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitwarden-tzone
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-tzone
    kind: SecretStore
  target:
    name: tzone-sm-secrets
    creationPolicy: Owner
  data:
    - secretKey: example
      remoteRef:
        key: ad7f0a39-43d0-441b-955b-b46c011007ff
