# External Secrets Operator: Helm, SDK TLS (cert-manager), ClusterSecretStore bitwarden-cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: "2.6.0"
    releaseName: external-secrets
    namespace: external-secrets
    valuesFile: external-secrets-values.yaml
    includeCRDs: true

resources:
  - namespace-external-secrets.yaml
  - certificate-bitwarden-root-ca.yaml
  - issuer-bitwarden-internal-ca.yaml
  - certificate-bitwarden-sdk-server-tls.yaml
  - bitwarden/
