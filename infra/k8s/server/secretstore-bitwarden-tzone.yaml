# Bitwarden Secrets Manager: один SecretStore = одна пара organization + project (документация ESO).
# organizationID / projectID — из URL и UI vault.bitwarden.com (не секреты).
# Токен machine account — в Secret bitwarden-access-token (bootstrap вне git).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: bitwarden-tzone
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      organizationID: "469e5438-bdbb-4434-a937-b46c00eb6890"
      projectID: "b8e06e87-b3e1-4f5b-890b-b46c00ee6a18"
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token
            key: token
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        key: ca.crt
