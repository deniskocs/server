# hostPath /home/denis/models → /models для vLLM Deployment (label component=vllm).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
spec:
  template:
    spec:
      volumes:
        - name: models
          hostPath:
            path: /home/denis/models
            type: Directory
      containers:
        - name: vllm
          ports:
            - name: vllm
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /models
