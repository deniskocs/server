# Hugging Face token для auto-download моделей (vllm-runner entrypoint).
# BSM: secret huggingface-token в project tzone (тот же projectID, что bitwarden-cluster).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: huggingface
  namespace: llm-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-cluster
    kind: ClusterSecretStore
  target:
    name: huggingface-secrets
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: huggingface-token
        property: b8e06e87-b3e1-4f5b-890b-b46c00ee6a18
