# RedHatAI Qwen3.5-122B-A10B NVFP4. Active model.
# VRAM ~79 GiB при 0.82×97 GiB (RTX PRO 6000); ~17 GiB — transcribe + резерв.
# Если не хватает KV-cache — поднять VLLM_GPU_MEMORY_UTILIZATION до 0.84, не выше.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen35-122b-a10b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen35-122b-a10b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen35-122b-a10b-nvfp4
  template:
    metadata:
      labels:
        app: vllm-qwen35-122b-a10b-nvfp4
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: DEFAULT_MODEL_NAME
              value: "RedHatAI/Qwen3.5-122B-A10B-NVFP4"
            - name: SERVED_MODEL_NAME
              value: "RedHatAI/Qwen3.5-122B-A10B-NVFP4"
            - name: API_KEY
              value: "localkey"
            - name: VLLM_MAX_MODEL_LEN
              value: "16384"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.82"
            - name: VLLM_KV_CACHE_DTYPE
              value: "fp8"
            - name: VLLM_MOE_BACKEND
              value: "flashinfer_cutlass"
            - name: VLLM_REASONING_PARSER
              value: "qwen3"
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen35-122b-a10b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen35-122b-a10b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "true"
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen35-122b-a10b-nvfp4
