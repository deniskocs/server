# Llama 3.3 Instruct 70B NVFP4. LOCK: enabled=false, replicas=0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-33-70b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-llama-33-70b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vllm-llama-33-70b-nvfp4
  template:
    metadata:
      labels:
        app: vllm-llama-33-70b-nvfp4
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: API_KEY
              value: "localkey"
            - name: DEFAULT_MODEL_NAME
              value: "nvidia/Llama-3.3-70B-Instruct-NVFP4"
            - name: SERVED_MODEL_NAME
              value: "llama-3.3-70b-instruct-fp4"
            - name: VLLM_MAX_MODEL_LEN
              value: "4096"
            - name: VLLM_DTYPE
              value: "auto"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: VLLM_TENSOR_PARALLEL_SIZE
              value: "1"
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama-33-70b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-llama-33-70b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  type: ClusterIP
  selector:
    app: vllm-llama-33-70b-nvfp4
