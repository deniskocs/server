# OpenAI GPT-OSS-120B. LOCK: enabled=false, replicas=0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gpt-oss-120b
  namespace: llm-orchestrator
  labels:
    app: vllm-gpt-oss-120b
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-gpt-oss-120b
  template:
    metadata:
      labels:
        app: vllm-gpt-oss-120b
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: DEFAULT_MODEL_NAME
              value: "openai/gpt-oss-120b"
            - name: SERVED_MODEL_NAME
              value: "openai/gpt-oss-120b"
            - name: API_KEY
              value: "localkey"
            - name: VLLM_MAX_MODEL_LEN
              value: "131072"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.88"
            - name: VLLM_ENABLE_AUTO_TOOL_CHOICE
              value: "true"
            - name: VLLM_TOOL_CALL_PARSER
              value: "openai"
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gpt-oss-120b
  namespace: llm-orchestrator
  labels:
    app: vllm-gpt-oss-120b
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  type: ClusterIP
  selector:
    app: vllm-gpt-oss-120b
  ports:
    - name: vllm
      port: 80
      targetPort: 80
      protocol: TCP
