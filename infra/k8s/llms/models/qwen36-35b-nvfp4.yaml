# RedHatAI Qwen3.6-35B-A3B NVFP4. LOCK: enabled=false, replicas=0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36-35b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen36-35b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-qwen36-35b-nvfp4
  template:
    metadata:
      labels:
        app: vllm-qwen36-35b-nvfp4
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: DEFAULT_MODEL_NAME
              value: "RedHatAI/Qwen3.6-35B-A3B-NVFP4"
            - name: SERVED_MODEL_NAME
              value: "RedHatAI/Qwen3.6-35B-A3B-NVFP4"
            - name: API_KEY
              value: "localkey"
            - name: VLLM_MAX_MODEL_LEN
              value: "32768"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.3"
            - name: VLLM_MOE_BACKEND
              value: "flashinfer_cutlass"
            - name: VLLM_REASONING_PARSER
              value: "qwen3"
            - name: VLLM_ENABLE_AUTO_TOOL_CHOICE
              value: "true"
            - name: VLLM_TOOL_CALL_PARSER
              value: "qwen3_coder"
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen36-35b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen36-35b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen36-35b-nvfp4
  ports:
    - name: vllm
      port: 80
      targetPort: 80
      protocol: TCP
