# RedHatAI Qwen3.6-35B-A3B NVFP4. Active model.
# RTX PRO 6000 ~97 GiB; VLLM_GPU_MEMORY_UTILIZATION=0.7 — vLLM + transcribe (Whisper large-v3) на одной GPU.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36-35b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen36-35b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "true"
    # SSA: live Deployment имел rollingUpdate; Recreate несовместим — Replace на sync.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-qwen36-35b-nvfp4
  template:
    metadata:
      labels:
        app: vllm-qwen36-35b-nvfp4
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: DEFAULT_MODEL_NAME
              value: "RedHatAI/Qwen3.6-35B-A3B-NVFP4"
            - name: SERVED_MODEL_NAME
              value: "RedHatAI/Qwen3.6-35B-A3B-NVFP4"
            - name: API_KEY
              value: "localkey"
            - name: VLLM_MAX_MODEL_LEN
              value: "16384"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.7"
            - name: VLLM_KV_CACHE_DTYPE
              value: "fp8"
            - name: VLLM_MOE_BACKEND
              value: "flashinfer_cutlass"
            - name: VLLM_REASONING_PARSER
              value: "qwen3"
            - name: VLLM_LANGUAGE_MODEL_ONLY
              value: "true"
            - name: VLLM_ENFORCE_EAGER
              value: "true"
            - name: VLLM_ENABLE_AUTO_TOOL_CHOICE
              value: "true"
            - name: VLLM_TOOL_CALL_PARSER
              value: "qwen3_coder"
          ports:
            - name: vllm
              containerPort: 80
              hostPort: 8030
              protocol: TCP
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen36-35b-nvfp4
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen36-35b-nvfp4
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: Replace=true
    llm-orchestrator.chilik.net/enabled: "true"
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen36-35b-nvfp4
  ports:
    - name: vllm
      port: 80
      targetPort: 80
      protocol: TCP
