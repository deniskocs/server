# Qwen2.5 7B Instruct AWQ. LOCK: enabled=false, replicas=0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen25-7b-awq
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen25-7b-awq
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vllm-qwen25-7b-awq
  template:
    metadata:
      labels:
        app: vllm-qwen25-7b-awq
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: deniskocs/core:vllm-runner-1.0.0
          imagePullPolicy: Always
          env:
            - name: API_KEY
              value: "localkey"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: DEFAULT_MODEL_NAME
              value: "Qwen/Qwen2.5-7B-Instruct-AWQ"
            - name: SERVED_MODEL_NAME
              value: "Qwen2.5-7B-Instruct-AWQ"
            - name: VLLM_QUANTIZATION
              value: "awq_marlin"
            - name: VLLM_MAX_MODEL_LEN
              value: "8192"
            - name: VLLM_DTYPE
              value: "float16"
            - name: VLLM_GPU_MEMORY_UTILIZATION
              value: "0.35"
          # Без limits nvidia.com/gpu — scheduler не резервирует карту целиком.
          # Доступ к GPU через runtimeClassName: nvidia; доля VRAM — VLLM_GPU_MEMORY_UTILIZATION.
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen25-7b-awq
  namespace: llm-orchestrator
  labels:
    app: vllm-qwen25-7b-awq
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    llm-orchestrator.chilik.net/enabled: "false"
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen25-7b-awq
