# llm-orchestrator API — образ: release-llm-orchestrator-api workflow.
# Том models — hostPath на GPU-ноде ai-server (те же веса, что для vLLM).
# Том configs — hostPath на ai-server (как ~/llm-orchestrator-configs в docker deploy).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-orchestrator-api
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-api
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-orchestrator-api
  template:
    metadata:
      annotations:
        chilik.net/redeploy-at: "2026-07-03T23:05:15Z"
      labels:
        app: llm-orchestrator-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-server
      runtimeClassName: nvidia
      containers:
        - name: api
          image: deniskocs/llm-orchestrator-api:0.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: MODELS_DIR
              value: /models
            - name: CONFIGS_DIR
              value: /configs
          volumeMounts:
            - name: models
              mountPath: /models
            - name: configs
              mountPath: /configs
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: models
          hostPath:
            path: /home/denis/models
            type: DirectoryOrCreate
        - name: configs
          hostPath:
            path: /home/denis/llm-orchestrator-configs
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: llm-orchestrator-api
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-api
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app: llm-orchestrator-api
  ports:
    - name: http
      port: 8765
      targetPort: http
