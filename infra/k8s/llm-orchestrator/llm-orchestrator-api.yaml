# llm-orchestrator API — образ обновляется release-llm-orchestrator-api workflow.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-orchestrator-api
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-api
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-orchestrator-api
  template:
    metadata:
      labels:
        app: llm-orchestrator-api
    spec:
      containers:
        - name: api
          image: deniskocs/llm-orchestrator-api:0.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: MODELS_DIR
              value: /models
            - name: CONFIGS_DIR
              value: /configs
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: llm-orchestrator-api
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-api
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app: llm-orchestrator-api
  ports:
    - name: http
      port: 8765
      targetPort: http
