# llm-orchestrator web UI — образ обновляется release-llm-orchestrator-web workflow.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-orchestrator-web
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-web
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-orchestrator-web
  template:
    metadata:
      annotations:
        chilik.net/redeploy-at: "2026-07-03T00:53:49Z"
      labels:
        app: llm-orchestrator-web
    spec:
      containers:
        - name: web
          image: deniskocs/llm-orchestrator-web:0.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: llm-orchestrator-web
  namespace: llm-orchestrator
  labels:
    app: llm-orchestrator-web
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app: llm-orchestrator-web
  ports:
    - name: http
      port: 80
      targetPort: http
