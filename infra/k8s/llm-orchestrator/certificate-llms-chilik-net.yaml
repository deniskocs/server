# TLS llms.chilik.net: HTTP-01 через Traefik (Mac nginx :80 → 10.0.0.2:80).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: llms-chilik-net
  namespace: llm-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  secretName: llms-chilik-net-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - llms.chilik.net
