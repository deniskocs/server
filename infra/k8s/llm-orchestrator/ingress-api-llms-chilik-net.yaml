# api.llms.chilik.net — orchestrator API (TLS: llms-chilik-net-tls, SAN в Certificate).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-orchestrator-api
  namespace: llm-orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - secretName: llms-chilik-net-tls
      hosts:
        - api.llms.chilik.net
  rules:
    - host: api.llms.chilik.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-orchestrator-api
                port:
                  number: 8765
