# Корень platform-стека в кластере (Argo Application server → infra/home-cluster/argocd/application.yaml).
# Вложенные kustomization с helmCharts требуют kustomize.buildOptions: --enable-helm в Argo CD.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cert-manager/
  - external-secrets/
  - nvidia-device-plugin/
  - helmchartconfig-traefik.yaml
  - argocd/
  - keycloak/
  # LOCK vLLM workloads — раскомментируй, чтобы Argo синкал llms/ (модели на ai-server)
  - llms/
