# ClusterSecretStore — Bitwarden BSM project cluster (platform / homelab).
# ESO, SDK, CA, bitwarden-access-token — repo server, infra/k8s/external-secrets/.
# ExternalSecret platform (Keycloak engine) ссылаются на name: bitwarden-cluster.
#
# Пока тот же BSM project, что и tzone (секреты не переносим). Позже — отдельный project cluster.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      organizationID: "469e5438-bdbb-4434-a937-b46c00eb6890"
      projectID: "b8e06e87-b3e1-4f5b-890b-b46c00ee6a18"
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token
            namespace: external-secrets
            key: token
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        namespace: external-secrets
        key: ca.crt
