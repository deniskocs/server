# Release target for llm-orchestrator web on Mac (docker run, not k8s).
# Обновляется workflow release-llm-orchestrator-web; после merge PR — deploy-orchestrator-web.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-orchestrator-web
  labels:
    app: llm-orchestrator-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-orchestrator-web
  template:
    metadata:
      labels:
        app: llm-orchestrator-web
    spec:
      containers:
        - name: web
          image: deniskocs/llm-orchestrator-web:0.0.1
          ports:
            - name: http
              containerPort: 80
