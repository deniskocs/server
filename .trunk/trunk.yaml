# Trunk (https://docs.trunk.io) — единая точка линтинга/форматирования.
# Сфокусировано на каталоге llm-orchestrator: см. ignore и локальную команду `trunk check llm-orchestrator`.
version: 0.1
cli:
  version: 1.22.15
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled: [node, python, ruby, go, rust]
lint:
  enabled:
    - git-diff-check
    - markdownlint@0.44.0
  ignore:
    # Всё репо кроме llm-orchestrator (для `trunk check` из корня без аргументов).
    - linters: [ALL]
      paths:
        - "**/*"
        - "!llm-orchestrator/**"
