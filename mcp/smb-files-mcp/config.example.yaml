# Скопируйте в config.yaml. Файл config.yaml не коммитится (см. .gitignore в корне server).
#
# Параметры как у контейнера smb-files: доступ к шаре напрямую из MCP (stdio), без HTTP API.

host: "10.0.0.1"
user: "smbuser"
password: "secret"

# Имя шары (по умолчанию public).
share: "public"

# Корень внутри шары (SMB_ROOT): все пути инструментов относительно него.
root: ""

# Необязательно (по умолчанию 445).
# port: 445
