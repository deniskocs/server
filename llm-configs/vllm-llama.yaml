# Конфигурация для vLLM Llama FP8 модели
model:
  default_name: "nvidia/Llama-3.3-70B-Instruct-FP8"
  served_name: "nvidia/Llama-3.3-70B-Instruct-FP8"

vllm:
  # FP8 модель уже квантованная, quantization не нужен
  quantization: null
  max_model_len: 8192
  # dtype не указываем, vLLM автоматически определит тип данных из модели
  dtype: null
  gpu_memory_utilization: 0.95
  enable_auto_tool_choice: true
  tool_call_parser: "llama3_json"
